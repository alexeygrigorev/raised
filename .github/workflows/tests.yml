name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Factory state: no modules exist yet, so the only meaningful Gradle check is
# that the project configuration loads. Issue #1 (which creates :app and
# :shared:ui-kit) replaces this with real `./gradlew test` + `assembleDebug`
# jobs.
jobs:
  gradle-config:
    name: Gradle config loads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Gradle help (config validates)
        run: ./gradlew help
